spring:
  application:
    name: backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: "TEMPORARY_TESTING_SECRET_KEY_MUST_BE_LONG_ENOUGH"

app:
  superadmin:
    username: ${APP_SUPERADMIN_USERNAME:superadmin}
    email: ${APP_SUPERADMIN_EMAIL:superadmin@tasktracker.com}
    password: ${APP_SUPERADMIN_PASSWORD:Admin123!}
