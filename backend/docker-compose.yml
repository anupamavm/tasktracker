version: "3.8"

services:
  postgres-db:
    image: postgres:16
    container_name: tasktrackerdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasktrackerdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tracker-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tasktracker.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    networks:
      - tracker-network
    restart: always
    depends_on:
      - postgres-db

volumes:
  postgres_data:
    driver: local

networks:
  tracker-network:
    driver: bridge
