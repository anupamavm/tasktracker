name: TaskTracker Full-Stack CI Pipeline

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  backend-ci:
    name: Backend CI (Java / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: "backend/pom.xml"

      - name: Launch Test Database Engine
        run: |
          docker run --name test_db -d \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=task_tracker_db \
            -p 5433:5432 \
            postgres:16

      - name: Verify Database Core Readiness
        run: |
          echo "Waiting for PostgreSQL database to be fully operational..."
          docker exec test_db sh -c 'until pg_isready -U postgres; do sleep 1; done'
          echo "PostgreSQL is online and fully operational."

      - name: Inject Environment Variables for Dotenv Setup
        run: |
          cd backend
          echo "DB_URL=jdbc:postgresql://localhost:5433/task_tracker_db" > .env
          echo "DB_USERNAME=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "JWT_SECRET=CI_CD_PIPELINE_TEMPORARY_TESTING_SECRET_KEY_32_BYTES_LONG_MIN" >> .env

      - name: Compile and Execute Unit/Integration Tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/task_tracker_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  frontend-ci:
    name: Frontend CI (Node.js / Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Matrix
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Execute Linter Checks
        run: |
          cd frontend
          npm run lint

      - name: Validate Next.js Production Build Compliance
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api
